name: Deploy CA Toolkit to GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [vault-updated]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout CA Toolkit vault content
        uses: actions/checkout@v4
        with:
          repository: naga-deepledger/ca-toolkit
          path: content
          token: ${{ secrets.VAULT_READ_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz site
        run: npx quartz build -d content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
